<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DIRT KINGS — Bullet Physics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
#c { display: block; }

/* ── Loading screen ── */
#loading {
  position: fixed; inset: 0; background: #0a0a0a;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 100;
}
#loading h1 { font-size: 64px; font-weight: 900; letter-spacing: 8px; color: #ff8c00; margin-bottom: 12px; }
#loading .sub { font-size: 13px; letter-spacing: 6px; color: #555; margin-bottom: 48px; }
#loading-bar-track { width: 320px; height: 2px; background: #1a1a1a; }
#loading-bar { height: 100%; width: 0%; background: #ff8c00; transition: width 0.2s; }
#loading-status { margin-top: 16px; font-size: 11px; letter-spacing: 2px; color: #444; }

/* ── Title screen ── */
#title {
  position: fixed; inset: 0; background: rgba(0,0,0,0.88);
  display: none; flex-direction: column;
  align-items: center; justify-content: center; z-index: 90;
}
#title h1 { font-size: 80px; font-weight: 900; letter-spacing: 10px; color: #ff8c00;
  text-shadow: 0 0 80px rgba(255,140,0,0.5); margin-bottom: 8px; }
#title .sub { font-size: 14px; letter-spacing: 10px; color: #666; margin-bottom: 64px; }
#title button {
  background: #ff8c00; color: #000; border: none; padding: 18px 56px;
  font-family: 'Courier New', monospace; font-size: 16px; font-weight: 900;
  letter-spacing: 5px; cursor: pointer; transition: all 0.15s;
}
#title button:hover { background: #fff; transform: scale(1.04); }

/* ── HUD ── */
#hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
#speedo { position: absolute; bottom: 32px; right: 44px; text-align: right; }
#speed-num {
  font-size: 76px; font-weight: 900; letter-spacing: -3px; line-height: 1;
  color: #ff8c00; text-shadow: 0 0 30px rgba(255,140,0,0.6);
}
#speed-unit { font-size: 12px; letter-spacing: 5px; color: #555; margin-top: 2px; }
#gear-display {
  position: absolute; bottom: 128px; right: 54px;
  font-size: 44px; font-weight: 900; color: #fff; opacity: 0.6;
}
#rpm-container {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); width: 280px;
}
#rpm-bar { height: 3px; background: #111; width: 100%; }
#rpm-fill { height: 100%; width: 0%; background: #ff8c00; }
#rpm-label { font-size: 10px; letter-spacing: 4px; color: #333; text-align: center; margin-top: 8px; }
#lap-hud { position: absolute; top: 28px; left: 50%; transform: translateX(-50%); text-align: center; }
#lap-time { font-size: 30px; font-weight: 900; color: #ff8c00; }
#lap-label { font-size: 10px; letter-spacing: 4px; color: #444; margin-top: 4px; }
#controls {
  position: absolute; bottom: 32px; left: 36px;
  font-size: 11px; letter-spacing: 2px; line-height: 2.2; color: #444;
}
#wheel-hud {
  position: absolute; top: 28px; right: 36px;
  font-size: 10px; letter-spacing: 1px; line-height: 2.0; color: #444;
}
.w-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; background: #ff8c00; margin-right: 6px; vertical-align: middle;
}
.w-dot.air { background: #2a2a2a; }
#cp-flash {
  position: absolute; top: 48%; left: 50%; transform: translate(-50%,-50%);
  font-size: 44px; font-weight: 900; letter-spacing: 8px; color: #ff8c00;
  text-shadow: 0 0 40px #ff8c00; opacity: 0; transition: opacity 0.6s;
  pointer-events: none;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="loading">
  <h1>DIRT KINGS</h1>
  <div class="sub">BULLET PHYSICS EDITION</div>
  <div id="loading-bar-track"><div id="loading-bar"></div></div>
  <div id="loading-status">INITIALISING BULLET...</div>
</div>

<div id="title">
  <h1>DIRT KINGS</h1>
  <div class="sub">4×4 OPEN TERRAIN</div>
  <button onclick="startRace()">IGNITION</button>
</div>

<div id="hud">
  <div id="speedo"><div id="speed-num">0</div><div id="speed-unit">KM/H</div></div>
  <div id="gear-display">N</div>
  <div id="rpm-container"><div id="rpm-bar"><div id="rpm-fill"></div></div><div id="rpm-label">RPM</div></div>
  <div id="lap-hud"><div id="lap-time">0:00.000</div><div id="lap-label">LAP 1</div></div>
  <div id="controls">
    W / ↑ &nbsp; THROTTLE<br>S / ↓ &nbsp; BRAKE<br>
    A / ← &nbsp; LEFT<br>D / → &nbsp; RIGHT<br>
    SPACE &nbsp; HANDBRAKE<br>R &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; RESET
  </div>
  <div id="wheel-hud">
    <div><span class="w-dot" id="w-fl"></span>FL</div>
    <div><span class="w-dot" id="w-fr"></span>FR</div>
    <div><span class="w-dot" id="w-rl"></span>RL</div>
    <div><span class="w-dot" id="w-rr"></span>RR</div>
  </div>
  <div id="cp-flash">CHECKPOINT!</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  window.__ammoReady = new Promise(function(resolve, reject) {
    var cdns = [
      'https://cdn.jsdelivr.net/npm/ammo.js@0.0.10/ammo.js',
      'https://unpkg.com/ammo.js@0.0.10/ammo.js',
      'https://kripken.github.io/ammo.js/builds/ammo.js'
    ];
    var idx = 0;
    function tryLoad() {
      if (idx >= cdns.length) { reject(new Error('All Ammo.js CDNs failed')); return; }
      var s = document.createElement('script');
      s.src = cdns[idx++];
      s.onload = function() { resolve(); };
      s.onerror = tryLoad;
      document.head.appendChild(s);
    }
    tryLoad();
  });
</script>
<script src="js/terrain.js"></script>
<script src="js/physics.js"></script>
<script src="js/vehicle.js"></script>
<script src="js/drive.js"></script>
<script src="js/checkpoints.js"></script>
<script src="js/renderer.js"></script>
<script src="js/visuals.js"></script>
<script src="js/scenery.js"></script>
<script src="js/main.js"></script>
</body>
</html>
